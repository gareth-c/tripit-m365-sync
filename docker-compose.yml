services:
  caddy:
    image: caddy:alpine@sha256:86deaf5e3d3408a6ccec08fbb79989783dd26e206ae10bcf78a801dc8c9ab794
    restart: unless-stopped
    ports:
      - "80:80"
      - "${HTTPS_PORT:-8443}:${HTTPS_PORT:-8443}"
      - "${HTTPS_PORT:-8443}:${HTTPS_PORT:-8443}/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - ics_cache:/srv/ics:ro
    env_file:
      - .env
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.50"

  syncer:
    image: ghcr.io/gareth-c/tripit-m365-sync/syncer:main
    build: ./syncer
    restart: unless-stopped
    volumes:
      - ics_cache:/data/ics
    env_file:
      - .env
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test:
        - CMD
        - python
        - /app/syncer_health.py
      interval: 30m
      timeout: 10s
      retries: 2
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.25"

volumes:
  caddy_data:
  caddy_config:
  ics_cache:
