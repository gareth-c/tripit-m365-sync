services:
  caddy:
    image: caddy:alpine@sha256:86deaf5e3d3408a6ccec08fbb79989783dd26e206ae10bcf78a801dc8c9ab794
    restart: unless-stopped
    ports:
      - "80:80"
      - "${HTTPS_PORT:-8443}:${HTTPS_PORT:-8443}"
      - "${HTTPS_PORT:-8443}:${HTTPS_PORT:-8443}/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - ics_cache:/srv/ics:ro
    environment:
      # Edit these values to match your setup
      - DOMAIN=tripit-m365-sync.domain.com
      - HTTPS_PORT=8443
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.50"

  syncer:
    image: ghcr.io/gareth-c/tripit-m365-sync/syncer:main
    build: ./syncer
    restart: unless-stopped
    volumes:
      - ics_cache:/data/ics
    environment:
      # Edit this value to your TripIt private iCal URL
      - TRIPIT_ICS_URL=https://www.tripit.com/feed/ical/private/TOKEN/tripit.ics
      - SYNC_INTERVAL_SECONDS=1800
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import os, time, sys
          st = os.stat('/data/ics')
          sys.exit(0 if time.time() - st.st_mtime < 7200 else 1)
      interval: 30m
      timeout: 10s
      retries: 2
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.25"

volumes:
  caddy_data:
  caddy_config:
  ics_cache:
